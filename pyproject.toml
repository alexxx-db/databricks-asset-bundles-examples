# Root config for repo-wide tooling (pyright).
# Ruff config is in .ruff.toml (which takes precedence over pyproject.toml).
# Individual bundles may have their own pyproject.toml.

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
reportMissingImports = "warning"
reportMissingTypeStubs = false
# Run from repo root; exclude notebooks and generated/template code
exclude = [
    "**/contrib/templates",
    "**/.venv",
    "**/venv",
]

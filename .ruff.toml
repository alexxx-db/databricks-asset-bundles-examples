# Ruff configuration — consolidates settings from pyproject.toml plus formatter config.
# This file takes precedence over pyproject.toml for ruff, so ALL settings must be here.

target-version = "py311"
line-length = 120
exclude = [
    ".git",
    "contrib/templates",
    "scripts/contrib/templates",
    ".venv",
    "venv",
]

# Databricks notebook .py files use magic commands (%pip, %run, %sql) that are
# invalid Python syntax. Ruff cannot parse them, producing cascading false
# positives. To regenerate this list: python scripts/generate_ruff_notebook_excludes.py
extend-exclude = [
    # -- contrib notebooks --
    "contrib/job_with_ai_parse_document/src",
    # -- knowledge_base notebooks --
    "knowledge_base/development_cluster/src",
    "knowledge_base/genie_agent_integration/src",
    "knowledge_base/genie_metadata_generator/notebooks",
    "knowledge_base/genie_space/src",
    "knowledge_base/genie_space_full/src",
    "knowledge_base/iceberg_catalog/notebooks",
    "knowledge_base/job_conditional_execution/src",
    "knowledge_base/job_file_arrival/src",
    "knowledge_base/job_table_update_trigger/src",
    "knowledge_base/job_with_for_each/src",
    "knowledge_base/job_with_task_values/src",
    "knowledge_base/target_includes/src",
    # -- template-generated notebooks --
    "default_minimal/src",
    "mlops_stacks/mlops_stacks/deployment",
    "mlops_stacks/mlops_stacks/training",
    "mlops_stacks/mlops_stacks/validation",
    # -- scripts/ mirrors of above --
    "scripts/contrib/job_with_ai_parse_document/src",
    "scripts/default_minimal/src",
    "scripts/knowledge_base/development_cluster/src",
    "scripts/knowledge_base/genie_agent_integration/src",
    "scripts/knowledge_base/genie_metadata_generator/notebooks",
    "scripts/knowledge_base/genie_space/src",
    "scripts/knowledge_base/genie_space_full/src",
    "scripts/knowledge_base/iceberg_catalog/notebooks",
    "scripts/knowledge_base/job_conditional_execution/src",
    "scripts/knowledge_base/job_file_arrival/src",
    "scripts/knowledge_base/job_table_update_trigger/src",
    "scripts/knowledge_base/job_with_for_each/src",
    "scripts/knowledge_base/job_with_task_values/src",
    "scripts/knowledge_base/target_includes/src",
    "scripts/mlops_stacks/mlops_stacks/deployment",
    "scripts/mlops_stacks/mlops_stacks/training",
    "scripts/mlops_stacks/mlops_stacks/validation",
]

[format]
exclude = [
    # Templates are responsible for formatting at the source.
    "dbt_sql/*",
    "default_python/*",
    "default_sql/*",
    "mlops_stacks/*",
    "lakeflow_pipelines_python/*",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # Pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
]
ignore = [
    "E501",   # line too long (handled by formatter or per-project)
    "F821",   # undefined name (spark/dbutils injected at runtime in Databricks notebooks)
]

[lint.per-file-ignores]
# Databricks .ipynb notebooks — cells use spark/dbutils globals and have
# imports scattered across cells.
"*.ipynb" = ["F821", "E402"]
# Non-notebook .py files that use Databricks runtime globals (spark, dbutils).
"**/transformations/*.py" = ["F821", "E402"]
"**/third_party_sinks/*.py" = ["F821", "E402"]
"**/monitoring_etl/*.py" = ["F821", "E402"]
"**/job_read_secret/src/*.py" = ["F821"]
"**/genie_metadata_generator/app/state/**/*.py" = ["F821"]
"**/conftest.py" = ["E402"]

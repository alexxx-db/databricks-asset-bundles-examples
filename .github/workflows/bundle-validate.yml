# Lightweight CI: validate bundle YAML and configuration for all bundles.
# Discovers bundle directories dynamically so new examples are validated automatically.
# Validate runs with a placeholder host so no workspace auth is required.

name: bundle-validate

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
    types: [checks_requested]
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate all bundles
        run: |
          for dir in $(python scripts/discover_bundle_dirs.py); do
            echo "Validating $dir ..."
            (cd "$dir" && databricks bundle validate -t dev) || exit 1
          done
        env:
          DATABRICKS_HOST: https://placeholder.databricks.com

# Lightweight CI: validate bundle YAML and configuration for all bundles.
# Discovers bundle directories dynamically so new examples are validated automatically.
# Validate runs with a placeholder host so no workspace auth is required.

name: bundle-validate

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
    types: [checks_requested]
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate all bundles
        run: |
          for dir in $(python scripts/discover_bundle_dirs.py); do
            echo "Validating $dir ..."
            # We use --host to override the hardcoded URLs in the bundle config
            (cd "$dir" && databricks bundle validate --host https://placeholder.databricks.com) || exit 1
          done
        env:
          # This dummy token stops the "cannot configure default credentials" error
          DATABRICKS_TOKEN: "dapi-dummy-token-for-syntax-validation"

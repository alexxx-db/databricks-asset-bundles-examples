name: validate

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
    types: [checks_requested]

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check knowledge_base/genie_metadata_generator/app/ contrib/data_engineering/

  pyright:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install pyright
        run: pip install pyright
      - name: Run pyright
        run: pyright

  py-compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check Python syntax
        run: |
          find . -name "*.py" -not -path "./contrib/templates/*" -print0 \
            | xargs -0 -r grep -LZ "^# Databricks notebook source" \
            > /tmp/py_files || true
          xargs -0 -r python -m py_compile < /tmp/py_files

  bundle-structure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate bundle schema
        run: python scripts/validate_bundle_schema.py

  # NEW: Validates Databricks Asset Bundle syntax across all examples
  bundle-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
      - name: Install PyYAML
        run: pip install pyyaml
      - name: Validate all bundles
        run: |
          for dir in $(python scripts/discover_bundle_dirs.py); do
            echo "Validating $dir ..."
            # --host and DATABRICKS_TOKEN bypass the workspace auth requirement
            (cd "$dir" && databricks bundle validate --host https://placeholder.databricks.com) || exit 1
          done
        env:
          DATABRICKS_TOKEN: "dapi-dummy-token-for-syntax-validation"

  readme-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Verify knowledge_base READMEs
        run: |
          missing=0
          for dir in knowledge_base/*/; do
            if [ ! -f "$dir/README.md" ]; then
              echo "ERROR: Missing README.md in $dir"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "$missing knowledge_base example(s) missing README.md"
            exit 1
          fi

  template-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check template checksums
        run: ./scripts/check_template_checksums.sh

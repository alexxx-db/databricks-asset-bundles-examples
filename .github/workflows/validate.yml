name: validate

on:
  pull_request:
    types: [opened, synchronize]
  merge_group:
    types: [checks_requested]

jobs:
  yamllint:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yml .

  ruff:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check knowledge_base/genie_metadata_generator/app/ contrib/data_engineering/

  pyright:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pyright
        run: pip install pyright

      - name: Run pyright
        run: pyright

  py-compile:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check Python syntax
        run: |
          # Exclude Go templates and Databricks notebooks (which use %magic commands).
          # Two-step approach avoids pipefail issues with grep -L exit codes.
          find . -name "*.py" -not -path "./contrib/templates/*" -print0 \
            | xargs -0 -r grep -LZ "^# Databricks notebook source" \
            > /tmp/py_files || true
          xargs -0 -r python -m py_compile < /tmp/py_files

  bundle-structure:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Validate bundle schema
        run: python scripts/validate_bundle_schema.py

  readme-check:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify knowledge_base READMEs
        run: |
          missing=0
          for dir in knowledge_base/*/; do
            if [ ! -f "$dir/README.md" ]; then
              echo "ERROR: Missing README.md in $dir"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "$missing knowledge_base example(s) missing README.md"
            exit 1
          fi
          echo "All knowledge_base examples have README.md"

  template-drift:
    runs-on:
      group: databricks-protected-runner-group
      labels: linux-ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check template checksums
        run: ./scripts/check_template_checksums.sh

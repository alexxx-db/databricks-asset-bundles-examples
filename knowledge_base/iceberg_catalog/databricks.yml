# databricks.yml — Iceberg Catalog Management Bundle
#
# Manages the shared Iceberg catalog layer between Databricks (Unity Catalog)
# and Snowflake (Open Catalog / Polaris).
#
# Three scheduled jobs:
#   iceberg_schema_drift_scan  — daily schema comparison UC ↔ Polaris; auto-apply safe changes
#   iceberg_catalog_sync       — hourly: register/refresh Databricks tables in Snowflake
#   iceberg_snapshot_expiry    — weekly: expire old snapshots and orphaned S3 files
#
# Python wheel:
#   All jobs invoke python_wheel_task against the iceberg_catalog package.
#   The wheel is built locally and uploaded by `databricks bundle deploy`.
#   Entry points (scan_drift, sync_catalog) are registered in pyproject.toml.
#
# Infrastructure:
#   S3 bucket, IAM roles, and Polaris service account are managed by Terraform
#   in ./terraform/. These are prerequisites — run Terraform first.
#
# Deploy:
#   terraform -chdir=terraform apply -var-file=envs/dev.tfvars
#   pip install build && python -m build   # produces dist/iceberg_catalog-*.whl
#   databricks bundle deploy --target dev
#   databricks bundle run iceberg_catalog_sync --target dev

bundle:
  name: iceberg-catalog

include:
  - resources/*.yml

variables:
  sf_polaris_catalog:
    description: Snowflake Open Catalog (Polaris) catalog name
    default: ICEBERG_LAKEHOUSE

  uc_db_catalog:
    description: UC managed Iceberg catalog for Databricks-authored tables
    default: iceberg_db

  uc_sf_catalog:
    description: UC foreign catalog for Snowflake-authored Iceberg tables
    default: iceberg_sf

  schemas_to_sync:
    description: Comma-separated schemas to include in catalog sync
    default: "finops,subscriber,billing,media_ops"

  secret_scope:
    description: Databricks secret scope holding Snowflake/Polaris credentials
    default: iceberg-polaris

  # Cluster config — shared by all three jobs
  spark_version:
    default: "15.4.x-scala2.12"

  node_type:
    default: "i3.xlarge"

  # Alert notification email
  alert_email:
    default: "platform-alerts@example.com"

workspace:
  host: https://myworkspace.databricks.com

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://myworkspace-dev.cloud.databricks.com
    variables:
      sf_polaris_catalog: ICEBERG_LAKEHOUSE_DEV
      uc_db_catalog:      iceberg_db_dev
      uc_sf_catalog:      iceberg_sf_dev

  test:
    workspace:
      host: https://myworkspace-test.cloud.databricks.com
    variables:
      sf_polaris_catalog: ICEBERG_LAKEHOUSE_TEST
      uc_db_catalog:      iceberg_db_test
      uc_sf_catalog:      iceberg_sf_test

  prod:
    workspace:
      host: https://myworkspace.cloud.databricks.com
    run_as:
      service_principal_name: iceberg-catalog-svc
    variables:
      alert_email: "platform-alerts@example.com"

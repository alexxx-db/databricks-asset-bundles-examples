# app.yaml - Databricks App configuration
name: genie-metadata-generator
display_name: Genify
description: AI-powered metadata generator for Databricks Genie

# Entry point - Run Streamlit
command: ["streamlit", "run", "app.py"]

# Environment variables from app resources
# Maps resource keys to environment variables accessible in app code
# See: https://docs.databricks.com/aws/en/dev-tools/databricks-apps/environment-variables
env:
  - name: LLM_ENDPOINT_NAME
    valueFrom: serving-endpoint
  - name: SUMMARIZER_ENDPOINT_NAME
    valueFrom: serving-endpoint-2

# Compute resources
# The warehouse here is for app compute - update with your warehouse ID
resources:
  - name: default
    warehouse_id: 5f8cf57aba11ff38  # TODO: Update with your warehouse ID

# Application configuration
# Note: DATABRICKS_HOST, DATABRICKS_CLIENT_ID, DATABRICKS_CLIENT_SECRET are auto-provided
# See: https://docs.databricks.com/aws/en/dev-tools/databricks-apps/system-env
config:
  # LLM Configuration
  # GPT-5.2: 400K input context, 128K max output per request
  # Rate limits: ITPM=50,000, OTPM=5,000, QPH=360,000
  # See: https://docs.databricks.com/gcp/en/machine-learning/foundation-model-apis/limits#rate-limits-by-model
  llm:
    endpoint_name: "databricks-gpt-5-2"  # Foundation model or custom serving endpoint
    max_tokens: 2048  # Max output tokens per request (GPT-5.2 supports up to 128K)
                      # Conservative for rate limits: 2048 allows ~2 requests/min within 5K OTPM
                      # Sufficient for interviews (~200 tokens/question, ~1500 for YAML)
    temperature: 0.7  # Sampling temperature (0.0 = deterministic, 1.0 = creative)
    summarizer_endpoint_name: "databricks-gemini-2-5-flash"  # Gemini 2.5 Flash - 1M token context, optimized for document parsing
    summarizer_max_tokens: 8192  # Max output tokens for summaries (Gemini Flash supports large outputs)
    summarizer_temperature: 0.3  # Lower temperature for more focused, deterministic summaries
  # SQL Warehouse Configuration for Unity Catalog queries
  sql_warehouse:
    warehouse_id: 5f8cf57aba11ff38 # For information_schema queries
    http_path: /sql/1.0/warehouses/5f8cf57aba11ff38 # Optional: for direct connections
  
  # Authentication Configuration
  auth:
    mode: "service_principal"  # Current: service_principal, Future: oauth_obo
  
  # UI Configuration
  ui:
    page_title: "Genify"
    page_icon: "🧞"
    layout: "wide"
  
  # Template paths (relative to app root)
  # Note: Section-based templates are in templates/table_comment/sections.yaml and templates/genie/sections.yaml
  templates:
    # tier1: "templates/table_comment_template.yml"  # Legacy: file doesn't exist, using section-based templates
    # tier2: "templates/genie_space_metadata.yml"    # Legacy: file doesn't exist, using section-based templates
    # prompt: "prompts/schema_generator_prompt.md"   # Legacy: Combined prompt (deprecated)
    table_comment_prompt: "prompts/table_comment_prompt.md"  # Phase 1: Table comments
    genie_prompt: "prompts/genie_metadata_prompt.md"  # Phase 2: Genie metadata

  # Lakebase PostgreSQL for session persistence
  # Enables resuming progress when users return to the app
  # See: https://apps-cookbook.dev/docs/fastapi/building_endpoints/lakebase/
  lakebase:
    enabled: true  # Set to true and configure resource to enable persistence
    resource_name: "genify-lakebase"  # Name of Lakebase resource in Databricks Apps
    schema: "genify"
    table: "user_sessions"
    pool_size: 5
template_type: genie_metadata
base_prompt: prompts/genie_metadata_prompt.md
template_dir: templates/genie

sections:
  - key: sql_expressions
    name: "SQL Expressions"
    file: 01_sql_expressions.yml
    description: "Reusable metrics, filters, and dimensions"
    prompt_focus: "Define key metrics (revenue, counts), filters (valid records, date ranges), and dimensions. These go into Genie Knowledge Store."
    
  - key: query_instructions
    name: "Query Instructions"
    file: 02_query_instructions.yml
    description: "Scenario-based query logic"
    prompt_focus: "Define how to handle time-based queries, aggregations, status filtering, and common patterns. Provide clear instructions for each scenario."
    
  - key: example_queries
    name: "Example Queries"
    file: 03_example_queries.yml
    description: "Natural language query examples"
    prompt_focus: "Provide 5-10 example queries with SQL that Genie should learn from. Include various query patterns."
    
  - key: clarification_rules
    name: "Clarification Rules"
    file: 04_clarification_rules.yml
    description: "When Genie should ask for more info"
    prompt_focus: "Define ambiguous scenarios where Genie should ask clarifying questions. Be specific about triggers and missing details."
    optional: true
    
  - key: space_context
    name: "Space Context"
    file: 05_space_context.yml
    description: "Defaults, scope, and column visibility"
    prompt_focus: "Define default filters, scope boundaries, which columns to show/hide, and space-level metadata."
    optional: true

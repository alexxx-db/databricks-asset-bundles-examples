# Column Details - Complex Logic Documentation
# Use this section for columns requiring detailed explanations beyond standard comments.

# Rule 5 & 7: Enums and Status Flags
key_enums:
  - column: "account_status"
    values:
      - value: "ACTIVE"
        meaning: "Customer has placed a bet in last 30 days"
      - value: "DORMANT"
        meaning: "Account exists but zero activity for >30 days"
      - value: "SUSPENDED"
        meaning: "Temporarily restricted due to risk check"
    triggers: "Status changes to SUSPENDED upon 3 failed login attempts"

# Rule 6: Calculated Columns
calculations:
  - column: "net_revenue"
    formula: "gross_bet_amount - payout_amount - bonus_cost"
    window: "Calculated daily at close of business"

# Rule 4: Timestamp Logic
timestamps:
  - column: "event_timestamp"
    timezone: "UTC"
    type: "Event Time (Client Side)"
    notes: "May have slight drift vs server_receipt_time"

# Rule 3: ID Columns
identifiers:
  - column: "global_user_id"
    type: "UUID"
    mapping: "Foreign key to 'dim_users.user_id'"

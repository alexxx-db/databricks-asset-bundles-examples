# Data Relationships - Topology and Connections

# Rule 10 & 20: Key Relationships & Mapping
relationships:
  - table: "related_table_name"
    type: "one-to-many"
    join_key: "local_col = remote_col"
    description: "Detailed mapping of foreign keys"
    legacy_connection: "Corresponds to TBL_OLD_CUST in legacy mainframe" # Rule 3

# Rule 17: Column Pairing Recommendations
analysis_guides:
  recommended_pairings:
    - columns: ["conversion_date", "signup_date"]
      reason: "Best used together for funnel analysis (Time to Convert)"
    - columns: ["bet_amount", "settlement_status"]
      reason: "Always filter by settlement_status='SETTLED' when summing bet_amount"

# Business Concepts - Table-level logic
business_concepts:
  concept_name:
    definition: "Clear definition"
    rationale: "Why this is calculated this way"
    calculation: "SQL Formula or Logic"

# app.yaml - Databricks App configuration for Description Agent
name: description-agent
display_name: Description Agent
description: AI-powered description generator for Unity Catalog tables and columns

# Entry point - Run simplified Streamlit app
command: ["streamlit", "run", "app_simple.py", "--server.port=8000"]

# Environment variables from app resources
# Maps resource keys to environment variables accessible in app code
env:
  - name: LLM_ENDPOINT_NAME
    valueFrom: serving-endpoint
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse

# Compute resources
resources:
  - name: default
    warehouse_id: 5f8cf57aba11ff38  # TODO: Update with your warehouse ID

# Application configuration
# Note: DATABRICKS_HOST, DATABRICKS_CLIENT_ID, DATABRICKS_CLIENT_SECRET are auto-provided
config:
  # LLM Configuration
  llm:
    endpoint_name: "databricks-gpt-5-2"  # Foundation model for generating descriptions
    max_tokens: 2048  # Max output tokens per request
    temperature: 0.7  # Sampling temperature (0.0 = deterministic, 1.0 = creative)
  
  # SQL Warehouse Configuration for Unity Catalog queries and data profiling
  sql_warehouse:
    warehouse_id: 5f8cf57aba11ff38  # For information_schema queries and profiling
    http_path: /sql/1.0/warehouses/5f8cf57aba11ff38
  
  # Authentication Configuration
  auth:
    mode: "service_principal"  # Service principal authentication
  
  # UI Configuration
  ui:
    page_title: "Description Agent"
    page_icon: "✨"
    layout: "wide"
  
  # Lakebase disabled for simplified app (using in-memory session state)
  lakebase:
    enabled: false


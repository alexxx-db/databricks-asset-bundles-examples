# databricks.yml — Genify: AI-Powered Genie Metadata Generator
#
# Deploys the Genify Databricks App: an AI interview tool that generates
# production-quality Genie Space metadata (instructions, example SQL, column
# descriptions) by conducting a structured LLM interview with data owners.
#
# App architecture:
#   Streamlit (Databricks Apps) → LLM client (Foundation Model API)
#   ↓                                        ↑
#   Table browser (UC info_schema) → LLM interview engine (section-based)
#   ↓
#   YAML export → apply directly to Genie Space via update_space API
#
# Backend options:
#   session_backend: "memory"    — no persistence (lost on restart)
#   session_backend: "lakebase"  — PostgreSQL via Databricks Lakebase (persistent)
#
# Two LLM endpoints:
#   LLM_ENDPOINT_NAME      — main interview LLM (GPT or Llama for Q&A)
#   SUMMARIZER_ENDPOINT_NAME — context summarizer (Gemini Flash for large schemas)
#   Why two: large table schemas (100+ columns) overflow the interview LLM's
#   context window. The summarizer compresses the schema first.
#
# Deploy:  databricks bundle deploy --target dev
# Access:  databricks bundle run launch_app

bundle:
  name: genie_metadata_generator

include:
  - resources/*.yml

variables:
  llm_endpoint:
    description: Foundation model endpoint for the interview LLM
    default: "databricks-gpt-5-2"

  summarizer_endpoint:
    description: Endpoint for schema context summarization (large table support)
    default: "databricks-gemini-2-5-flash"

  warehouse_id:
    description: SQL warehouse ID for Unity Catalog information_schema queries
    lookup:
      warehouse: "Shared Unity Catalog Serverless"

  # Lakebase (PostgreSQL) for persistent session storage
  # Set lakebase_enabled=true when you want sessions to survive app restarts
  lakebase_enabled:
    description: Enable Lakebase PostgreSQL for persistent session storage
    default: "false"

  # IMPORTANT (DABs bug): presets.name_prefix NOT applied to apps resources.
  # Workaround: embed ${bundle.target} in the app name directly.
  app_name:
    description: Databricks App name (must be globally unique in your workspace)
    default: "genify-${bundle.target}"

targets:
  dev:
    default: true
    mode: development
    workspace:
      host: https://myworkspace.databricks.com
    variables:
      llm_endpoint: "databricks-meta-llama-3-3-70b-instruct"   # cheaper for dev
      lakebase_enabled: "false"

  prod:
    workspace:
      host: https://myworkspace.databricks.com
    run_as:
      service_principal_name: genify-app-svc
    variables:
      llm_endpoint: "databricks-gpt-5-2"
      lakebase_enabled: "true"

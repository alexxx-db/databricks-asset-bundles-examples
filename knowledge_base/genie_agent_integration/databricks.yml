# databricks.yml — Genie Agent Integration Bundle
#
# Demonstrates five progressive patterns for wrapping a Genie Space
# as a callable AI agent tool:
#
#   1. uc_function_tool     — Unity Catalog Python function: call Genie from SQL/AI
#   2. langchain_agent      — LangChain BaseTool + CHAT_ZERO_SHOT_REACT agent
#   3. langchain_rag        — Genie as retriever in a LangChain RAG chain (MLflow logged)
#   4. vector_rag           — Hybrid: Genie SQL + Vector Search retriever in one chain
#   5. same_conversation    — Multi-user stateful Genie (per-user conversation tracking)
#
# All patterns share the same Genie space and can be mixed in production.
# The MLflow-logged chain (pattern 3) is production-ready for Model Serving.
#
# Deploy: databricks bundle deploy --target dev
# Run:    databricks bundle run genie_agent_demo

bundle:
  name: genie_agent_integration

include:
  - resources/*.yml

variables:
  genie_space_id:
    description: Genie space ID to wrap as an agent tool
    default: "YOUR_SPACE_ID_HERE"

  llm_endpoint:
    description: Foundation model endpoint for the agent
    default: "databricks-meta-llama-3-3-70b-instruct"

  vector_search_endpoint:
    description: Vector Search endpoint for hybrid RAG pattern
    default: "one-env-shared-endpoint-5"

  vector_search_index:
    description: >
      Fully-qualified Vector Search index name for hybrid RAG.
      Format: catalog.schema.index_name
    default: "echostar_db_iceberg.genie_docs.space_doc_index"

  secret_scope:
    description: Databricks secret scope for the Genie API token
    default: "echostar-genie"

  secret_key:
    description: Secret key within scope for Genie API PAT
    default: "api_token"

  uc_catalog:
    description: UC catalog for the registered UC function
    default: "echostar_db_iceberg"

  uc_schema:
    description: UC schema for the registered UC function
    default: "genie_tools"

workspace:
  host: https://myworkspace.databricks.com

targets:
  dev:
    default: true
    mode: development
  prod:
    run_as:
      service_principal_name: genie-agent-svc

resources:
  jobs:
    genie_agent_demo:
      name: "genie-agent-integration-demo-${bundle.target}"
      description: >
        Runs all five Genie agent integration patterns sequentially.
        Demonstrates: UC function, LangChain agent, RAG chain, vector+RAG,
        and multi-user stateful conversation management.
      tags:
        team: platform
        workstream: agentic-ai

      tasks:
        # Pattern 1: Register the Genie space as a UC Python function
        - task_key: register_uc_function
          description: "Create/replace UC Python function wrapping Genie API"
          notebook_task:
            notebook_path: ./src/01_uc_function_tool.py
            base_parameters:
              genie_space_id: "{{job.parameters.genie_space_id}}"
              uc_catalog:     "{{job.parameters.uc_catalog}}"
              uc_schema:      "{{job.parameters.uc_schema}}"
              secret_scope:   "{{job.parameters.secret_scope}}"
              secret_key:     "{{job.parameters.secret_key}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              master: local[*]

        # Pattern 2: LangChain agent with Genie as a BaseTool
        - task_key: langchain_agent
          description: "CHAT_ZERO_SHOT_REACT agent using Genie BaseTool"
          depends_on:
            - task_key: register_uc_function
          notebook_task:
            notebook_path: ./src/02_langchain_agent.py
            base_parameters:
              genie_space_id: "{{job.parameters.genie_space_id}}"
              llm_endpoint:   "{{job.parameters.llm_endpoint}}"
              secret_scope:   "{{job.parameters.secret_scope}}"
              secret_key:     "{{job.parameters.secret_key}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              master: local[*]

        # Pattern 3: Genie-as-retriever RAG chain, MLflow logged
        - task_key: genie_rag_chain
          description: "Genie as retriever in LangChain RAG chain — MLflow logged"
          depends_on:
            - task_key: langchain_agent
          notebook_task:
            notebook_path: ./src/03_genie_rag_chain.py
            base_parameters:
              genie_space_id: "{{job.parameters.genie_space_id}}"
              llm_endpoint:   "{{job.parameters.llm_endpoint}}"
              secret_scope:   "{{job.parameters.secret_scope}}"
              secret_key:     "{{job.parameters.secret_key}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              master: local[*]

        # Pattern 4: Hybrid Vector Search + Genie RAG
        - task_key: vector_genie_rag
          description: "Hybrid: Vector Search docs + Genie SQL in one chain"
          depends_on:
            - task_key: genie_rag_chain
          notebook_task:
            notebook_path: ./src/04_vector_genie_rag.py
            base_parameters:
              genie_space_id:          "{{job.parameters.genie_space_id}}"
              llm_endpoint:            "{{job.parameters.llm_endpoint}}"
              vector_search_endpoint:  "{{job.parameters.vector_search_endpoint}}"
              vector_search_index:     "{{job.parameters.vector_search_index}}"
              secret_scope:            "{{job.parameters.secret_scope}}"
              secret_key:              "{{job.parameters.secret_key}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              master: local[*]

        # Pattern 5: Multi-user stateful conversation management
        - task_key: stateful_conversations
          description: "Per-user conversation state: continue or reset"
          depends_on:
            - task_key: vector_genie_rag
          notebook_task:
            notebook_path: ./src/05_stateful_conversations.py
            base_parameters:
              genie_space_id: "{{job.parameters.genie_space_id}}"
              secret_scope:   "{{job.parameters.secret_scope}}"
              secret_key:     "{{job.parameters.secret_key}}"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              master: local[*]

      parameters:
        - name: genie_space_id
          default: ${var.genie_space_id}
        - name: llm_endpoint
          default: ${var.llm_endpoint}
        - name: vector_search_endpoint
          default: ${var.vector_search_endpoint}
        - name: vector_search_index
          default: ${var.vector_search_index}
        - name: secret_scope
          default: ${var.secret_scope}
        - name: secret_key
          default: ${var.secret_key}
        - name: uc_catalog
          default: ${var.uc_catalog}
        - name: uc_schema
          default: ${var.uc_schema}

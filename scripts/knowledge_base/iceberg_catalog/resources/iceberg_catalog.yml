resources:
  jobs:

    # ── Job 1: Schema Drift Scan ──────────────────────────────────────────────
    #
    # WHY this job exists:
    #   When Databricks ETL jobs evolve a table schema (add/rename/widen columns),
    #   Snowflake's registered Iceberg tables immediately see broken or stale schemas.
    #   This job compares every table's schema in UC against the Polaris registration
    #   and either auto-applies safe changes or raises a structured alert for breaking ones.
    #
    # Exit codes (used for downstream branching):
    #   0 = no drift or only safe drift (auto-applied)
    #   1 = non-breaking drift detected (warning)
    #   2 = BREAKING drift detected (alert email fired, manual review required)
    #
    # python_wheel_task entry point: scan_drift (cli.py:scan_drift)
    iceberg_schema_drift_scan:
      name: "iceberg-schema-drift-scan-${bundle.target}"
      description: >
        Compares Iceberg table schemas between Unity Catalog and Snowflake Open Catalog.
        Auto-applies non-breaking changes (new columns, updated docs).
        Raises email alert on breaking changes (type narrowing, column drops).
      tags:
        team:       platform
        workstream: governance

      schedule:
        quartz_cron_expression: "0 0 6 * * ?"   # 06:00 daily
        timezone_id: "America/Denver"
        pause_status: UNPAUSED

      email_notifications:
        on_failure:
          - ${var.alert_email}
        no_alert_for_skipped_runs: true

      health:
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 3600   # alert if scan takes >1 hour

      tasks:
        - task_key: scan_drift
          description: "Detect schema drift UC ↔ Polaris and auto-apply safe changes"
          python_wheel_task:
            package_name: iceberg_catalog
            entry_point:  scan_drift
            parameters:
              - "--uc-sf-catalog={{job.parameters.uc_sf_catalog}}"
              - "--uc-db-catalog={{job.parameters.uc_db_catalog}}"
              - "--secret-scope={{job.parameters.secret_scope}}"
              - "--snowflake-account={{secrets/iceberg-polaris/snowflake_account}}"
              - "--principal-role=databricks_svc_role"
              - "--polaris-catalog={{job.parameters.sf_polaris_catalog}}"
              - "--apply-safe-changes"
          new_cluster: &iceberg_cluster
            spark_version: ${var.spark_version}
            node_type_id:  ${var.node_type}
            num_workers: 0
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              master: "local[*, 4]"
              # Iceberg Spark extensions for schema inspection via Spark SQL
              spark.sql.extensions: >-
                org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
              spark.sql.catalog.iceberg_sf: "org.apache.iceberg.spark.SparkCatalog"
              spark.sql.catalog.iceberg_sf.type: rest
            aws_attributes:
              instance_profile_arn: "{{secrets/iceberg-polaris/instance_profile_arn}}"
          libraries:
            - whl: ./dist/iceberg_catalog-*.whl

        # Conditional alert task — only runs when scan_drift exits with code 2
        - task_key: alert_breaking_drift
          description: "Send PagerDuty-compatible alert for breaking schema drift"
          depends_on:
            - task_key: scan_drift
              outcome: FAILED   # scan_drift exits 2 (sys.exit(2)) → job marks it FAILED
          notebook_task:
            notebook_path: ./notebooks/alert_breaking_drift.py
            base_parameters:
              uc_sf_catalog:    "{{job.parameters.uc_sf_catalog}}"
              uc_db_catalog:    "{{job.parameters.uc_db_catalog}}"
              slack_secret_key: "slack_webhook_url"
              secret_scope:     "{{job.parameters.secret_scope}}"
          new_cluster: *iceberg_cluster

      parameters:
        - name: uc_sf_catalog
          default: ${var.uc_sf_catalog}
        - name: uc_db_catalog
          default: ${var.uc_db_catalog}
        - name: sf_polaris_catalog
          default: ${var.sf_polaris_catalog}
        - name: secret_scope
          default: ${var.secret_scope}

    # ── Job 2: Catalog Sync (Databricks → Snowflake) ─────────────────────────
    #
    # WHY event-driven registration beats Snowflake Tasks:
    #   Snowflake Tasks poll every N minutes (wasting compute credits) and
    #   introduce latency. The correct pattern for Databricks → Snowflake is:
    #     1. Databricks job writes to S3 (commits new Iceberg snapshot)
    #     2. This sync job discovers the new metadata.json location in UC
    #     3. Calls ALTER ICEBERG TABLE ... REFRESH METADATA_FILE_PATH
    #   Zero polling lag, zero wasted Snowflake credits.
    #
    #   The sync_catalog entry point (cli.py:sync_catalog) iterates all
    #   Iceberg tables in the managed catalog and refreshes each one.
    #   It resolves the current metadata.json path from the UC table location
    #   (IcebergTableRegistrar.get_table_location) rather than s3 ls.
    iceberg_catalog_sync:
      name: "iceberg-catalog-sync-${bundle.target}"
      description: >
        Discovers all Databricks-authored Iceberg tables and registers or refreshes
        them in Snowflake Open Catalog. Runs every 30 minutes.
        Uses IcebergTableRegistrar to resolve metadata.json paths from UC,
        then calls ALTER ICEBERG TABLE ... REFRESH in Snowflake.
      tags:
        team:       platform
        workstream: governance

      schedule:
        quartz_cron_expression: "0 0/30 * * * ?"   # every 30 min
        timezone_id: "America/Denver"
        pause_status: UNPAUSED

      email_notifications:
        on_failure:
          - ${var.alert_email}

      tasks:
        - task_key: sync_catalog
          description: "Register/refresh all Databricks Iceberg tables in Snowflake"
          python_wheel_task:
            package_name: iceberg_catalog
            entry_point:  sync_catalog
            parameters:
              - "--uc-catalog={{job.parameters.uc_db_catalog}}"
              - "--schemas={{job.parameters.schemas_to_sync}}"
              - "--sf-polaris-catalog={{job.parameters.sf_polaris_catalog}}"
              - "--secret-scope={{job.parameters.secret_scope}}"
              - "--sf-warehouse=COMPUTE_WH"
              - "--sf-external-volume=ICEBERG_VOL"
          new_cluster: *iceberg_cluster
          libraries:
            - whl: ./dist/iceberg_catalog-*.whl

      parameters:
        - name: uc_db_catalog
          default: ${var.uc_db_catalog}
        - name: schemas_to_sync
          default: ${var.schemas_to_sync}
        - name: sf_polaris_catalog
          default: ${var.sf_polaris_catalog}
        - name: secret_scope
          default: ${var.secret_scope}

    # ── Job 3: Iceberg Snapshot Expiry ────────────────────────────────────────
    #
    # WHY snapshot expiry matters (cost):
    #   Every Iceberg write creates a new snapshot. Old snapshots are NOT
    #   automatically garbage collected — they accumulate indefinitely on S3.
    #   A typical pipeline (daily writes to subscriber_events and
    #   invoice_line_items) generates ~30 snapshots/month/table. Without expiry:
    #     - 12 months × 30 snapshots × avg 500MB data files = 180GB/table/year
    #     - At $0.023/GB/month = ~$4/table/month in wasted S3 cost
    #     - 50 tables = ~$200/month unnecessary spend
    #
    #   expire_snapshots() removes snapshot metadata AND deletes unreferenced
    #   Parquet files from S3.  retain_last=2 keeps the two most recent
    #   snapshots for rollback safety.
    #
    # IMPORTANT timing constraint:
    #   Run BEFORE the S3 lifecycle noncurrent_version_expiration policy fires
    #   (configured to 90 days in terraform/s3.tf). If S3 deletes files first,
    #   Iceberg's manifest may still reference them → broken reads.
    iceberg_snapshot_expiry:
      name: "iceberg-snapshot-expiry-${bundle.target}"
      description: >
        Expires Iceberg snapshots older than 7 days (168 hours) across all tables
        in the managed catalog. Also removes orphaned S3 files. Prevents unbounded
        S3 storage growth from daily pipeline writes.
      tags:
        team:       platform
        workstream: governance

      schedule:
        quartz_cron_expression: "0 0 3 * * SUN"   # Sunday 03:00
        timezone_id: "America/Denver"
        pause_status: UNPAUSED

      email_notifications:
        on_failure:
          - ${var.alert_email}

      tasks:
        - task_key: expire_snapshots
          description: "Expire old snapshots and remove orphaned S3 files"
          notebook_task:
            notebook_path: ./notebooks/expire_iceberg_snapshots.py
            base_parameters:
              uc_catalog:       "{{job.parameters.uc_catalog}}"
              retention_hours:  "168"   # 7 days
              dry_run:          "false"
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id:  ${var.node_type}
            num_workers: 2   # parallel snapshot expiry across tables
            spark_conf:
              spark.sql.extensions: >-
                org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
              spark.sql.catalog.spark_catalog: "org.apache.iceberg.spark.SparkSessionCatalog"
              spark.sql.catalog.spark_catalog.type: hive
            aws_attributes:
              instance_profile_arn: "{{secrets/iceberg-polaris/instance_profile_arn}}"
          libraries:
            - whl: ./dist/iceberg_catalog-*.whl

      parameters:
        - name: uc_catalog
          default: ${var.uc_db_catalog}

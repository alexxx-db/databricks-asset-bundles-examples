# Metadata - Administrative & Lineage

# Rule 19: Data Source Context
lineage:
  upstream_system: "Source System Name (e.g., Salesforce, PAM, IMS)"
  integration_type: "Batch / Streaming / CDC"
  transformations: |
    High-level description of ETL applied. 
    Example: "Raw JSON flattened, PII hashed, currency converted to USD."


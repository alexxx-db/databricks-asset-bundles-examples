# CLARIFICATION RULES - When Genie should ask for more information
# Be very explicit about triggers and required details
# Reference: https://docs.databricks.com/aws/en/genie/best-practices

clarification_rules:
  - trigger_condition: "When does this ambiguity occur?"
    missing_details:
      - "What detail is missing?"
      - "What other detail is needed?"
    clarification_question: |
      The question Genie should ask the user.
      Make it specific and provide options.
    example_prompts:
      - "Example user question 1"
      - "Example user question 2"


# EXAMPLE SQL QUERIES - Teach Genie complex patterns
# These go into Genie Example SQL tab
# Use for multi-table queries and complex logic
# Reference: https://docs.databricks.com/aws/en/genie/best-practices

example_queries:
  - prompt: "Natural language question a user might ask"
    description: "What this query demonstrates"
    sql: |
      SELECT 
        column1,
        column2,
        AGG_FUNCTION(column3) as metric
      FROM schema.table
      WHERE condition
      GROUP BY column1, column2
      ORDER BY metric DESC
    category: "query_category"


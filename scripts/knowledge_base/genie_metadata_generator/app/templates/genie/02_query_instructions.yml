# QUERY INSTRUCTIONS - How to query this table in this space
# These become plain text instructions in Genie
# Keep focused and specific to this space's use cases
# Reference: https://docs.databricks.com/aws/en/genie/best-practices

query_instructions:
  - scenario: "Scenario name (e.g., Time-based queries)"
    instruction: |
      Clear instructions for how Genie should handle this scenario.
      Be specific about:
      - Which columns to use
      - What filters to apply
      - How to handle ambiguity
      - Default behavior
    applies_to:
      - "Use case 1"
      - "Use case 2"
      - "Use case 3"

